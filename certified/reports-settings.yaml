# 各設定に何を記載すればよいかについて説明します。
#
#  date: PDF最初のページの左上に記載の日付を記載する
#  file: intermediate-filesフォルダに保存したCSVのファイル名を記載する
#  output: 出力ファイル名を記載する
#  pages: PDFから直接抽出する場合の設定だが、認定一覧にはほとんど使わない
#  expected_count: PDF最初のページの左上に記載の認定人数などをここに（件数チェックで使用）
#    certified: 認定の件数
#    repudiation: 否認の件数
#  reason-type: 否認理由が4段階評価になった 2023年3月14日 以降のデータでは TypeB を指定する
#  script-version:
#    第193回の分科会から、「定期接種」の被害として申請された案件が登場した。
#    従来の申請は v2 を使用し、上述の「定期接種」の案件には v3 を使用する。
#    各症例データの inoculation_type プロパティの値をそれぞれ違う値で扱う。
#  source
#    url: 元資料として使ったPDFのURLを記載する
#
settings: [
  {
    date: '2026/03/26',
    file: '001681219-2.csv',
    output: '001681219-2.json',
    pages: '',
    expected_count: {
      certified: 1,
      repudiation: 0
    },
    reason-type: 'TypeB',
    script-version: v3,
    source: {
      url: https://www.mhlw.go.jp/content/10900000/001681219.pdf,
    },
  }
]
